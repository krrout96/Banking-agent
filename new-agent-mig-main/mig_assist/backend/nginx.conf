server {
    listen 8000;
    server_name localhost;
    client_max_body_size 15m;

    root /app/static;
    index index.html;

    # Serve generated diagrams directly from filesystem
    location /diagrams/ {
        alias /app/static/diagrams/;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # Serve React Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend agent (running on 8081)
    location /invocations {
        proxy_pass http://127.0.0.1:8081/invocations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location /ping {
        proxy_pass http://127.0.0.1:8081/ping;
    }
}
